<div class="container mt-5">

  <h2 class="mb-4">
    Categorías
  </h2>

  <div class="card shadow mb-4">

    <div class="card-body">

      <h4>
        {{
          modoEdicion
          ? 'Editar Categoría'
          : 'Nueva Categoría'
        }}
      </h4>

      <div class="row">

        <div class="col-md-4 mb-2">
          <input
            class="form-control"
            placeholder="Nombre"
            [(ngModel)]="nuevaCategoria.nombre"
          >
        </div>

        <div class="col-md-5 mb-2">
          <input
            class="form-control"
            placeholder="Descripción"
            [(ngModel)]="nuevaCategoria.descripcion"
          >
        </div>

        <div class="col-md-3 mb-2">
          <button
            class="btn btn-success w-100"
            (click)="guardarCategoria()"
          >

            {{
              modoEdicion
              ? 'Actualizar'
              : 'Guardar'
            }}

          </button>
        </div>

      </div>

    </div>

  </div>

  <div class="card shadow">

    <div class="card-body table-responsive">

      <table
        class="table table-bordered table-hover"
      >

        <thead class="table-dark">

          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>

        </thead>

        <tbody>

          @for (
            categoria of categorias;
            track categoria.id
          ) {

            <tr>

              <td>
                {{ categoria.id }}
              </td>

              <td>
                {{ categoria.nombre }}
              </td>

              <td>
                {{ categoria.descripcion }}
              </td>

              <td>

                <span
                  class="badge"
                  [class.bg-success]="
                    categoria.estado
                  "
                  [class.bg-danger]="
                    !categoria.estado
                  "
                >

                  {{
                    categoria.estado
                    ? 'Activa'
                    : 'Inactiva'
                  }}

                </span>

              </td>

              <td>

                <button
                  class="btn btn-warning btn-sm me-2"
                  (click)="
                    editarCategoria(
                      categoria
                    )
                  "
                >
                  Editar
                </button>

                <button
                  class="btn btn-danger btn-sm"
                  (click)="
                    eliminarCategoria(
                      categoria.id
                    )
                  "
                >
                  Eliminar
                </button>

              </td>

            </tr>

          }

        </tbody>

      </table>

    </div>

  </div>

</div>
