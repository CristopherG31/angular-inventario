<div class="container mt-5">
  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card shadow">

        <div class="card-body">

          <h2 class="text-center mb-4">
            Iniciar sesión
          </h2>

          <form (ngSubmit)="login()">

            <div class="mb-3">
              <label>Email</label>

              <input
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
              >
            </div>

            <div class="mb-3">
              <label>Password</label>

              <input
                type="password"
                class="form-control"
                [(ngModel)]="password"
                name="password"
              >
            </div>

            <button
              class="btn btn-primary w-100"
              type="submit"
            >
              Entrar
            </button>

          </form>

        </div>
      </div>

    </div>

  </div>
</div>
